<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="View the Skillwyn Labs company catalogue with services, products, and build capabilities."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#070707" />
    <link rel="canonical" href="https://labs.skillwyn.com/catalogue/" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />
    <title>Skillwyn Labs Catalogue</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        color: #f5efe2;
        background:
          radial-gradient(circle at 78% 12%, rgba(0, 154, 218, 0.14), transparent 28%),
          radial-gradient(circle at 14% 18%, rgba(241, 210, 138, 0.12), transparent 24%),
          #070707;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        min-height: 100vh;
        padding: 22px max(18px, calc((100vw - 1180px) / 2)) 36px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 62px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        padding: 8px 10px 8px 16px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.025)),
          rgba(7, 7, 7, 0.58);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(24px) saturate(1.2);
      }

      .brand {
        display: inline-flex;
        align-items: center;
      }

      .brand img {
        width: 174px;
        height: auto;
        display: block;
      }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        border-radius: 999px;
        padding: 0 16px;
        font-size: 0.9rem;
        font-weight: 900;
        white-space: nowrap;
      }

      .button.primary {
        color: #111111;
        background: #f1d28a;
      }

      .button.secondary {
        border: 1px solid rgba(255, 255, 255, 0.16);
        color: #ffffff;
        background: rgba(255, 255, 255, 0.06);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 0.78fr) auto;
        align-items: end;
        gap: 28px;
        padding: 62px 0 28px;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: #f1d28a;
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 820px;
        margin: 0;
        color: #ffffff;
        font-size: clamp(2.7rem, 7vw, 6.4rem);
        line-height: 0.9;
        letter-spacing: -0.055em;
      }

      .hero p:not(.eyebrow) {
        max-width: 650px;
        margin: 20px 0 0;
        color: #d6d6cf;
        font-size: 1rem;
        line-height: 1.7;
      }

      .viewer-shell {
        overflow: hidden;
        height: min(78vh, 760px);
        min-height: 620px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 22px;
        background: #111111;
        box-shadow: 0 34px 110px rgba(0, 0, 0, 0.34);
      }

      .viewer-shell iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #ffffff;
      }

      @media (max-width: 760px) {
        .page {
          padding: 14px 12px 24px;
        }

        .topbar,
        .nav-actions,
        .hero {
          align-items: stretch;
        }

        .topbar,
        .hero {
          grid-template-columns: 1fr;
        }

        .topbar {
          border-radius: 22px;
          flex-direction: column;
        }

        .brand img {
          width: 160px;
        }

        .nav-actions {
          width: 100%;
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        .button {
          min-height: 42px;
          padding: 0 12px;
          font-size: 0.82rem;
        }

        .hero {
          display: grid;
          gap: 18px;
          padding: 36px 2px 20px;
        }

        h1 {
          font-size: clamp(2.35rem, 13vw, 3.3rem);
        }

        .viewer-shell {
          height: 70vh;
          min-height: 460px;
          border-radius: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <nav class="topbar" aria-label="Catalogue navigation">
        <a class="brand" href="/" aria-label="Skillwyn Labs home">
          <img src="/skillwyn-white-logo.png" alt="Skillwyn Labs" />
        </a>
        <div class="nav-actions">
          <a class="button secondary" href="/">Home</a>
          <a class="button primary" href="/skillwyn-labs-catalogue.pdf" download>Download PDF</a>
        </div>
      </nav>

      <section class="hero">
        <div>
          <p class="eyebrow">Company Catalogue</p>
          <h1>Skillwyn Labs Catalogue</h1>
          <p>
            View our services, products, and build capabilities in one dedicated
            catalogue page.
          </p>
        </div>
        <a class="button secondary" href="/skillwyn-labs-catalogue.pdf" target="_blank" rel="noreferrer">
          Open PDF
        </a>
      </section>

      <section class="viewer-shell" aria-label="Skillwyn Labs catalogue PDF viewer">
        <iframe
          src="/skillwyn-labs-catalogue.pdf#toolbar=1&navpanes=0"
          title="Skillwyn Labs Catalogue PDF"
        ></iframe>
      </section>
    </main>
  </body>
</html>
